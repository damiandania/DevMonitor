name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  unit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Headless unit suites
        run: bash tests/run-tests.sh --unit

  # Full app + CLI build (Phase 1) — compiles the SwiftUI / Liquid Glass views the unit suites
  # can't. continue-on-error so it never blocks a PR if the runner lacks the macOS 26 SDK yet;
  # drop continue-on-error once `macos-latest` ships it.
  build:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen
      - name: Build app + CLI
        run: bash tests/run-tests.sh   # Phase 1 (build) + Phase 2 (units)
