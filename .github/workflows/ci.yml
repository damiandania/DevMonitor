name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  unit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Headless unit suites
        run: bash tests/run-tests.sh --unit

# Only the headless unit suites run in CI (Phase 2 — pure `swiftc`, no Xcode host).
# Phase 1 (the full app build) compiles the SwiftUI / Liquid Glass views and needs Xcode 26 /
# the macOS 26 SDK; run `bash tests/run-tests.sh` locally for that. If `macos-latest` lacks the
# Swift toolchain these suites need, pin `runs-on` to a newer image once available.
